services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: langtutor
      POSTGRES_USER: langtutor
      POSTGRES_PASSWORD: langtutor
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langtutor"]
      interval: 10s
      retries: 5

  redis:
    image: redis:8.0-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ./lexis-api
      dockerfile: Dockerfile
      args:
        VERSION: "0.11.0"
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_PORT: "8080"
      APP_SECRET: dev-secret-change-in-production-32ch
      DATABASE_URL: postgres://langtutor:langtutor@postgres:5432/langtutor?sslmode=disable
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./lexis-web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_APP_NAME: lang.tutor
    depends_on:
      - api
    volumes:
      - ./lexis-web:/app
      - /app/node_modules
      - /app/.next

volumes:
  pg_data:
  redis_data:
